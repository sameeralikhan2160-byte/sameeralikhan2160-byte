<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feFlood flood-color="#7aa2f7" flood-opacity="1" result="color1"/>
      <feComposite in="color1" in2="blur1" operator="in" result="glow1"/>

      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur2"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.95" result="color2"/>
      <feComposite in="color2" in2="blur2" operator="in" result="glow2"/>

      <feMerge>
        <feMergeNode in="glow2"/>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="centerGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3d6aa8" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#2a4d7a" stop-opacity="0.65"/>
      <stop offset="75%" stop-color="#1a2f4d" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0d0e1a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="sideGlowLeft" cx="15%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#2a4d7a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d0e1a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="sideGlowRight" cx="85%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#2a4d7a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d0e1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="240" fill="#0d0e1a"/>
  <rect width="900" height="240" fill="url(#sideGlowLeft)"/>
  <rect width="900" height="240" fill="url(#sideGlowRight)"/>
  <rect width="900" height="240" fill="url(#centerGlow)"/>

  <text x="450" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="56" font-weight="700" fill="#f2f7ff" filter="url(#neonGlow)">
    Sameer Ali Khan
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.5s" repeatCount="indefinite"/>
  </text>

  <text x="450" y="162" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="21" font-weight="500" fill="#8fb3fb" filter="url(#neonGlow)">
    Cloud &amp; DevOps Engineer — AWS | Linux | Jenkins | Docker
  </text>

  <line x1="150" y1="200" x2="750" y2="200" stroke="#7aa2f7" stroke-width="1.5" opacity="0.35"/>
</svg>
